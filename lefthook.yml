pre-commit:
  parallel: true
  jobs:
    - name: files format
      run: bun run fix
      stage_fixed: true

    - name: typescript check
      run: bun run tscheck
      stage_fixed: true

    - name: knip
      run: bun run knip

    - name: react doctor
      run: bunx react-doctor -y --staged

pre-push:
  jobs:
    - name: Build
      run: bun run build
      stage_fixed: true

    - name: Test
      run: bun run test
      stage_fixed: true

commit-msg:
  commands:
    lint-commit-message:
      run: bun run commitlint --edit {1}
