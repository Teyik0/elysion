pre-commit:
  # Top-level jobs run sequentially. The parallel group runs first; only once
  # its `stage_fixed` jobs have re-staged their changes does `react doctor`
  # run — so `--staged` always reflects the final commit content. Running it
  # inside the parallel group would race the re-stage and be nondeterministic.
  jobs:
    - name: format-and-check
      group:
        parallel: true
        jobs:
          - name: files format
            run: bun run fix
            stage_fixed: true

          - name: typescript check
            run: bun run tscheck
            stage_fixed: true

          - name: knip
            run: bun run knip

    - name: react doctor
      run: bunx react-doctor -y --staged

pre-push:
  jobs:
    - name: Build
      run: bun run build
      stage_fixed: true

    - name: Test
      run: bun run test
      stage_fixed: true

commit-msg:
  commands:
    lint-commit-message:
      run: bun run commitlint --edit {1}
